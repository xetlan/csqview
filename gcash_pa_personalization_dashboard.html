<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Protected</title>
<style>
  :root{--blue:#007DFE;--blue2:#0057c2;--text:#0a1733;--muted:#5e6f8b;--line:#dde6f3;--bad:#c1272d}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:radial-gradient(1000px 500px at 50% -10%,rgba(0,125,254,.18),transparent 60%),linear-gradient(180deg,#f4f7fc,#e9f1ff);font:15px/1.6 -apple-system,BlinkMacSystemFont,"SF Pro Text","Inter","Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--text)}
  .gate{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
  .box{width:100%;max-width:380px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:32px 30px;box-shadow:0 16px 50px rgba(0,30,80,.12);text-align:center}
  .lock{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--blue2));margin:0 auto 18px;display:flex;align-items:center;justify-content:center;font-size:24px}
  h1{margin:0 0 6px;font-size:19px;letter-spacing:-.2px}
  p{margin:0 0 22px;color:var(--muted);font-size:13px}
  input{width:100%;padding:12px 14px;font-size:15px;border:1px solid var(--line);border-radius:10px;outline:none;transition:border .15s}
  input:focus{border-color:var(--blue)}
  button{width:100%;margin-top:12px;padding:12px;font-size:15px;font-weight:700;color:#fff;background:var(--blue);border:none;border-radius:10px;cursor:pointer;transition:background .15s}
  button:hover{background:var(--blue2)}
  .err{color:var(--bad);font-size:12.5px;font-weight:600;margin-top:12px;min-height:16px;opacity:0;transition:opacity .15s}
  .err.show{opacity:1}
  .hint{margin-top:18px;font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="box">
    <div class="lock">🔒</div>
    <h1>Protected content</h1>
    <p>Enter the password to view this dashboard.</p>
    <form id="f" autocomplete="off">
      <input id="pw" type="password" placeholder="Password" autofocus />
      <button type="submit">Unlock</button>
      <div class="err" id="err">Incorrect password</div>
    </form>
    <div class="hint">Stays unlocked for this browser session.</div>
  </div>
</div>

function b2u(b64){const s=atob(b64),u=new Uint8Array(s.length);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return u;}
async function deriveKey(pw){
  const base=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt:b2u(SALT),iterations:ITER,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["decrypt"]);
}
async function tryDecrypt(pw){
  const key=await deriveKey(pw);
  const buf=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2u(IV)},key,b2u(CT));
  return new TextDecoder("utf-8").decode(buf);
}
function render(html){
  document.open();document.write(html);document.close();
  if(location.hash){setTimeout(function(){try{var el=document.getElementById(location.hash.slice(1));if(el)el.scrollIntoView();}catch(e){}},120);}
}
async function unlock(pw,remember){
  const html=await tryDecrypt(pw);
  if(remember)try{sessionStorage.setItem(SKEY,pw);}catch(e){}
  render(html);
}
(async function(){
  let saved=null;try{saved=sessionStorage.getItem(SKEY);}catch(e){}
  if(saved){try{await unlock(saved,false);return;}catch(e){try{sessionStorage.removeItem(SKEY);}catch(_){}}}
  const f=document.getElementById("f"),pw=document.getElementById("pw"),err=document.getElementById("err");
  f.addEventListener("submit",async function(e){
    e.preventDefault();err.classList.remove("show");
    try{await unlock(pw.value,true);}catch(_){err.classList.add("show");pw.value="";pw.focus();}
  });
})();
